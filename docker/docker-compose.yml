version: "3.9"

services:
  smith-chart:
    build: .
    image: smith-chart-service:latest
    container_name: smith-chart-service
    ports:
      - "8000:8000"
    environment:
      - MPLBACKEND=Agg
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
